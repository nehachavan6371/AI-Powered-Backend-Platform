version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
    networks:
      - llm-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - llm-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - llm-network

volumes:
  postgres_data:
  redis_data:

networks:
  llm-network:
